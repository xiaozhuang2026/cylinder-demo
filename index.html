<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圆柱体侧面积演示</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>🔵 圆柱体侧面积演示</h1>
    <p>点击"上升"增加高度，拖动滑块展开侧面</p>
  </header>

  <main class="demo-area">
    <svg class="visualization" viewBox="0 0 600 450" id="main-svg">
      <defs>
        <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#1ABC9C"/>
          <stop offset="100%" stop-color="#16A085"/>
        </linearGradient>
        <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#E74C3C"/>
          <stop offset="100%" stop-color="#C0392B"/>
        </linearGradient>
        <clipPath id="cylinderClip"><rect x="175" y="130" width="150" height="190" rx="0"/></clipPath>
      </defs>

      <rect x="0" y="0" width="600" height="450" fill="#2D2D2D"/>

      <!-- BASE CYLINDER GROUP (can wobble) -->
      <g id="cylinder-group" clip-path="url(#cylinderClip)">
        <!-- Main body -->
          <rect id="cyl-body" x="175" y="200" width="150" height="120" fill="url(#tealGrad)" stroke="white" stroke-width="2"/>
          <!-- Bottom ellipse -->
          <ellipse id="cyl-bot" cx="250" cy="320" rx="75" ry="25" fill="#16A085" stroke="white" stroke-width="2"/>
          <!-- Top ellipse -->
          <ellipse id="cyl-top" cx="250" cy="200" rx="75" ry="25" fill="#1ABC9C" stroke="white" stroke-width="2"/>
      </g>

      <!-- RED UNFOLDED PART -->
      <g id="unfolded-group">
        <!-- Top ellipse (detached) -->
          <ellipse id="red-top-ell" cx="250" cy="130" rx="75" ry="25" fill="#E74C3C" stroke="white" stroke-width="2" style="display:none"/>
          
          <!-- Unfolded rectangle (starts at top ellipse right edge, extends right) -->
          <g id="flat-rect-group" style="display:none">
            <rect id="flat-rect" x="325" y="105" width="0" height="70" fill="url(#redGrad)" stroke="white" stroke-width="2"/>
            <!-- Dimension labels -->
            <text id="dim-label" x="0" y="0" fill="white" font-size="14" font-weight="bold" style="display:none">2πr × h</text>
          </g>
      </g>

      <!-- DATA LABELS -->
      <g id="data-labels" style="display:none">
        <!-- 原高 -->
          <line x1="340" y1="200" x2="340" y2="320" stroke="#1ABC9C" stroke-width="2" stroke-dasharray="5,3"/>
          <line x1="335" y1="200" x2="345" y2="200" stroke="#1ABC9C" stroke-width="2"/>
          <line x1="335" y1="320" x2="345" y2="320" stroke="#1ABC9C" stroke-width="2"/>
          <text x="350" y="265" fill="#1ABC9C" font-size="14" font-weight="bold">原高=10cm</text>
        
        <!-- 增高 -->
          <line x1="375" y1="130" x2="375" y2="200" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,3"/>
          <line x1="370" y1="130" x2="380" y2="130" stroke="#E74C3C" stroke-width="2"/>
          <line x1="370" y1="200" x2="380" y2="200" stroke="#E74C3C" stroke-width="2"/>
          <text x="385" y="170" fill="#E74C3C" font-size="14" font-weight="bold">增高=5cm</text>
        
        <!-- 增加的表面积 -->
          <text x="250" y="400" text-anchor="middle" fill="#FFD700" font-size="18" font-weight="bold">增加的表面积 = 628 cm²</text>
      </g>
    </svg>

    <!-- Data Panel -->
    <div id="data-panel" class="data-panel" style="display:none">
      <h3>📊 计算数据</h3>
      <div class="data-row"><span class="data-label">底面半径 r</span><span class="data-value">10 cm</span></div>
      <div class="data-row"><span class="data-label">圆柱原高 h₁</span><span class="data-value">10 cm</span></div>
      <div class="data-row"><span class="data-label">增加高度 h₂</span><span class="data-value">5 cm</span></div>
      <div class="data-row"><span class="data-label">增高后总高</span><span class="data-value">15 cm</span></div>
      <div class="data-row"><span class="data-label">底面周长 2πr</span><span class="data-value">62.8 cm</span></div>
      <div class="data-row highlight"><span class="data-label">增加的侧面积</span><span class="data-value">628 cm²</span></div>
      <div class="formula">
        <strong>计算过程：</strong><br>
        ΔS = 2πr × Δh<br>
        = 2 × 3.14 × 10 × 5<br>
        = <strong style="color:#FFD700">628 cm²</strong>
      </div>
    </div>
  </main>

  <div class="controls">
    <button class="btn btn-primary" id="btn-rise">⬆ 上升</button>
    <button class="btn btn-reset-btn" id="btn-reset" style="display:none">↻ 复原</button>
    <button class="btn btn-primary" id="btn-data">📊 显示数据</button>
    <div class="slider-group" id="slider-group" style="opacity:0.3;pointer-events:none">
      <span class="slider-label">滑块拉开（右）:</span>
      <input type="range" id="slider" min="0" max="100" value="0" class="slider">
    </div>
  </div>

  <footer>
    <p>圆柱体侧面积可视化演示 © 2026</p>
  </footer>
</div>

<script>
const slider = document.getElementById('slider');
const btnRise = document.getElementById('btn-rise');
const btnReset = document.getElementById('btn-reset');
const btnData = document.getElementById('btn-data');
const sliderGroup = document.getElementById('slider-group');

const cylGroup = document.getElementById('cylinder-group');
const cylBody = document.getElementById('cyl-body');
const cylTop = document.getElementById('cyl-top');
const unfoldedGroup = document.getElementById('unfolded-group');
const redTopEll = document.getElementById('red-top-ell');
const flatGroup = document.getElementById('flat-rect-group');
const flatRect = document.getElementById('flat-rect');
const dimLabel = document.getElementById('dim-label');
const dataLabels = document.getElementById('data-labels');
const dataPanel = document.getElementById('data-panel');

let risen = false;
let showingData = false;
let wobbleTime = 0;
let animationId = null;

// === RISE ===
btnRise.addEventListener('click', () => {
  if (risen) return;
  risen = true;
  redTopEll.style.display = 'block';
  flatGroup.style.display = 'none';
  btnRise.style.display = 'none';
  btnReset.style.display = 'inline-block';
  sliderGroup.style.opacity = '1';
  sliderGroup.style.pointerEvents = 'auto';

  // Animate red top ellipse appearing
  let op = 0;
  const riseAnim = setInterval(() => {
    op += 0.08;
    if (op >= 1) { op = 1; clearInterval(riseAnim); }
    redTopEll.style.opacity = op;
    redTopEll.setAttribute('cy', 200 - op * 70);
  }, 20);
});

// === RESET ===
btnReset.addEventListener('click', () => {
  risen = false;
  slider.value = 0;
  redTopEll.style.display = 'none';
  flatGroup.style.display = 'none';
  dimLabel.style.display = 'none';
  btnRise.style.display = 'inline-block';
  btnReset.style.display = 'none';
  sliderGroup.style.opacity = '0.3';
  sliderGroup.style.pointerEvents = 'none';

  // Reset cylinder position
  cylGroup.setAttribute('transform', '');
});

// === SLIDER (with wobble) ===
slider.addEventListener('input', (e) => {
  if (!risen) return;
  const p = e.target.value / 100;

  if (p <= 0.03) {
    // Fully wrapped state
    redTopEll.style.display = 'block';
    flatGroup.style.display = 'none';
    dimLabel.style.display = 'none';
  } else {
    // Unfolding: flat rect extends right
    redTopEll.style.display = 'block';
    flatGroup.style.display = 'block';
    
    const maxW = 220;
    const w = (p - 0.03) / 0.97 * maxW;
    const h = 70;
    const startX = 325;

    flatRect.setAttribute('x', startX);
    flatRect.setAttribute('y', 130);
    flatRect.setAttribute('width', w);
    flatRect.setAttribute('height', h);

    // Show dimension label when partially unfolded
    if (p > 0.4) {
      dimLabel.style.display = 'block';
      dimLabel.setAttribute('x', startX + w / 2);
      dimLabel.setAttribute('y', 130 + h / 2 + 8);
    } else {
      dimLabel.style.display = 'none';
    }

    // Add wobble to cylinder when sliding
    startWobble();
  }
});

// Wobble effect
function startWobble() {
  wobbleTime = Date.now();
  if (animationId) cancelAnimationFrame(animationId);
  animateWobble();
}

function animateWobble() {
  const elapsed = Date.now() - wobbleTime;
  const wobble = Math.sin(elapsed * 0.008) * 3; // Gentle oscillation
  
  cylGroup.setAttribute('transform', `rotate(${wobble} 250 200)`);
  
  // Check if still moving slider
  if (Date.now() - wobbleTime < 200) {
    animationId = requestAnimationFrame(animateWobble);
  }
}

// Stop wobble when not sliding
slider.addEventListener('mouseup', () => {
  if (animationId) cancelAnimationFrame(animationId);
  cylGroup.setAttribute('transform', '');
});

slider.addEventListener('mouseleave', () => {
  if (animationId) cancelAnimationFrame(animationId);
  cylGroup.setAttribute('transform', '');
});

// === SHOW DATA ===
btnData.addEventListener('click', () => {
  showingData = !showingData;
  dataPanel.style.display = showingData ? 'flex' : 'none';
  dataLabels.style.display = (showingData && risen) ? 'block' : 'none';
  btnData.textContent = showingData ? '🔽 隐藏数据' : '📊 显示数据';
});
</script>
</body>
</html>
