<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圆柱体侧面积演示</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>🔵 圆柱体侧面积演示</h1>
    <p>点击"上升"增加高度，拖动滑块展开侧面</p>
  </header>

  <main class="demo-area">
    <svg class="visualization" viewBox="0 0 650 450" id="svg">
      <defs>
        <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#1ABC9C"/>
          <stop offset="100%" stop-color="#16A085"/>
        </linearGradient>
        <linearGradient id="rg" x1="1" y1="0" x2="0" y2="0">
          <stop offset="0%" stop-color="#C0392B"/>
          <stop offset="100%" stop-color="#E74C3C"/>
        </linearGradient>
      </defs>

      <rect width="650" height="450" fill="#2D2D2D"/>

      <!-- CYLINDER (wobbles as group) -->
      <g id="cyl-g">
        <!-- Base cylinder -->
        <rect x="225" y="220" width="150" height="110" fill="url(#tg)" stroke="#fff" stroke-width="2"/>
        <ellipse cx="300" cy="330" rx="75" ry="22" fill="#16A085" stroke="#fff" stroke-width="2"/>
        <ellipse cx="300" cy="220" rx="75" ry="22" fill="#1ABC9C" stroke="#fff" stroke-width="2"/>

        <!-- Added section - GREEN inner body -->
        <g id="added" style="display:none">
          <rect id="g-body" x="225" y="150" width="150" height="70" fill="url(#tg)" stroke="#fff" stroke-width="2"/>
          <ellipse cx="300" cy="220" rx="75" ry="22" fill="#16A085"/>
          <!-- Green top - always stays -->
          <ellipse id="g-top" cx="300" cy="150" rx="75" ry="22" fill="#1ABC9C" stroke="#fff" stroke-width="2"/>
        </g>
      </g>

      <!-- RED SKIN - peels left, NOT in wobble group so it stays still -->
      <g id="red-g" style="display:none">
        <!-- This is the peeling red surface -->
        <path id="red-peel" d="" fill="url(#rg)" stroke="#fff" stroke-width="2"/>
      </g>

      <!-- DATA -->
      <g id="data-labels" style="display:none">
        <line x1="390" y1="220" x2="390" y2="330" stroke="#1ABC9C" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="385" y1="220" x2="395" y2="220" stroke="#1ABC9C" stroke-width="2"/>
        <line x1="385" y1="330" x2="395" y2="330" stroke="#1ABC9C" stroke-width="2"/>
        <text x="400" y="280" fill="#1ABC9C" font-size="14" font-weight="bold">原高=10cm</text>
        <line x1="420" y1="150" x2="420" y2="220" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="415" y1="150" x2="425" y2="150" stroke="#E74C3C" stroke-width="2"/>
        <line x1="415" y1="220" x2="425" y2="220" stroke="#E74C3C" stroke-width="2"/>
        <text x="430" y="190" fill="#E74C3C" font-size="14" font-weight="bold">增高=5cm</text>
        <text x="300" y="400" text-anchor="middle" fill="#FFD700" font-size="18" font-weight="bold">增加的表面积 = 628 cm²</text>
      </g>
    </svg>

    <div id="data-panel" class="data-panel" style="display:none">
      <h3>📊 计算数据</h3>
      <div class="data-row"><span class="data-label">底面半径 r</span><span class="data-value">10 cm</span></div>
      <div class="data-row"><span class="data-label">圆柱原高 h₁</span><span class="data-value">10 cm</span></div>
      <div class="data-row"><span class="data-label">增加高度 h₂</span><span class="data-value">5 cm</span></div>
      <div class="data-row"><span class="data-label">增高后总高</span><span class="data-value">15 cm</span></div>
      <div class="data-row"><span class="data-label">底面周长 2πr</span><span class="data-value">62.8 cm</span></div>
      <div class="data-row highlight"><span class="data-label">增加的侧面积</span><span class="data-value">628 cm²</span></div>
      <div class="formula"><strong>计算：</strong><br>ΔS = 2πr × Δh = 2×3.14×10×5 = <strong style="color:#FFD700">628 cm²</strong></div>
    </div>
  </main>

  <div class="controls">
    <button class="btn btn-primary" id="btn-rise">⬆ 上升</button>
    <button class="btn btn-reset-btn" id="btn-reset" style="display:none">↻ 复原</button>
    <button class="btn btn-primary" id="btn-data">📊 显示数据</button>
    <div class="slider-group" id="sl-g" style="opacity:0.3;pointer-events:none">
      <span class="slider-label">滑块拉开（右）:</span>
      <input type="range" id="slider" min="0" max="100" value="0" class="slider">
    </div>
  </div>
  <footer><p>圆柱体侧面积可视化演示 © 2026</p></footer>
</div>

<script>
const $=id=>document.getElementById(id);
const CX=300, YT=150, YB=220, RX=75, RY=22, BH=70;
let risen=false, showData=false, wId=null, wT=0;

function drawRed(p) {
  // p: 0=fully wrapped, 1=fully peeled left
  const redG = $('red-g');
  const path = $('red-peel');
  
  if (p <= 0.01) {
    // Fully wrapped: red band around the added section body
    const leftX = CX - RX; // 225
    const rightX = CX + RX; // 375
    path.setAttribute('d',
      `M ${leftX} ${YT} L ${leftX} ${YB} ` +
      `A ${RX} ${RY} 0 0 0 ${rightX} ${YB} ` +
      `L ${rightX} ${YT} ` +
      `A ${RX} ${RY} 0 0 1 ${leftX} ${YT} Z`
    );
    redG.style.display = 'block';
    return;
  }

  // Peeling: red skin peels from the LEFT side of the cylinder
  const peelAngle = p * Math.PI;
  const angle = Math.PI - peelAngle;
  const px = CX + RX * Math.cos(angle);
  const pyT = YT + RY * Math.sin(angle);
  const pyB = pyT + BH;

  const lx = CX - RX;
  const lyT = YT;
  const lyB = YB;

  // Flat rect width proportional to peeled arc length
  const halfCircumference = Math.PI * RX;
  const flatW = p * halfCircumference;

  // Build path: flat rect (left) + arc on cylinder (right)
  const d =
    `M ${lx - flatW} ${lyT} ` +           // top-left of flat rect
    `L ${lx} ${lyT} ` +                   // right to cylinder left edge (top)
    `A ${RX} ${RY} 0 0 0 ${px} ${pyT} ` + // arc along cylinder top to peel point
    `L ${px} ${pyB} ` +                   // straight down at peel point
    `A ${RX} ${RY} 0 0 1 ${lx} ${lyB} ` + // arc back along cylinder bottom
    `L ${lx - flatW} ${lyB} ` +           // left to close (bottom)
    `Z`;

  path.setAttribute('d', d);
  redG.style.display = 'block';
}

// RISE
$('btn-rise').onclick = () => {
  if (risen) return;
  risen = true;
  $('added').style.display = 'block';
  $('btn-rise').style.display = 'none';
  $('btn-reset').style.display = 'inline-block';
  $('sl-g').style.opacity = '1';
  $('sl-g').style.pointerEvents = 'auto';

  let h = 0;
  const anim = setInterval(() => {
    h += 3;
    if (h >= BH) { h = BH; clearInterval(anim); }
    $('g-body').setAttribute('y', YB - h);
    $('g-body').setAttribute('height', h);
    $('g-top').setAttribute('cy', YB - h);
  }, 16);
  // Show red skin after rise completes
  setTimeout(() => drawRed(0), 500);
};

// RESET
$('btn-reset').onclick = () => {
  risen = false;
  slider.value = 0;
  $('added').style.display = 'none';
  $('red-g').style.display = 'none';
  $('btn-rise').style.display = 'inline-block';
  $('btn-reset').style.display = 'none';
  $('sl-g').style.opacity = '0.3';
  $('sl-g').style.pointerEvents = 'none';
  $('cyl-g').setAttribute('transform', '');
  if (wId) cancelAnimationFrame(wId);
};

// SLIDER
const slider = $('slider');
slider.oninput = () => {
  if (!risen) return;
  const p = slider.value / 100;
  drawRed(p);
  startWobble();
};

// WOBBLE
function startWobble() {
  wT = Date.now();
  if (wId) cancelAnimationFrame(wId);
  doW();
}
function doW() {
  const t = Date.now() - wT;
  const a = Math.sin(t*0.012) * 2.5 * Math.max(0, 1-t/500);
  $('cyl-g').setAttribute('transform', `rotate(${a} 300 260)`);
  if (t < 500) wId = requestAnimationFrame(doW);
  else $('cyl-g').setAttribute('transform', '');
}

// DATA
$('btn-data').onclick = () => {
  showData = !showData;
  $('data-panel').style.display = showData ? 'flex' : 'none';
  $('data-labels').style.display = (showData && risen) ? 'block' : 'none';
  $('btn-data').textContent = showData ? '🔽 隐藏数据' : '📊 显示数据';
};
</script>
</body>
</html>
