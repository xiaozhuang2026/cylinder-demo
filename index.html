<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圆柱体侧面积演示</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>🔵 圆柱体侧面积演示</h1>
    <p>点击"上升"增加高度，拖动滑块展开侧面</p>
  </header>

  <main class="demo-area">
    <svg class="visualization" viewBox="0 0 500 420">
      <defs>
        <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#1ABC9C"/>
          <stop offset="100%" stop-color="#16A085"/>
        </linearGradient>
        <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#E74C3C"/>
          <stop offset="100%" stop-color="#C0392B"/>
        </linearGradient>
      </defs>

      <rect x="0" y="0" width="500" height="420" fill="#2D2D2D"/>
      <g stroke="#3a3a3a" stroke-width="0.5">
        <line x1="0" y1="100" x2="500" y2="100"/><line x1="0" y1="200" x2="500" y2="200"/>
        <line x1="0" y1="300" x2="500" y2="300"/><line x1="100" y1="0" x2="100" y2="420"/>
        <line x1="200" y1="0" x2="200" y2="420"/><line x1="300" y1="0" x2="300" y2="420"/>
        <line x1="400" y1="0" x2="400" y2="420"/>
      </g>

      <!-- BASE CYLINDER -->
      <g id="base-cylinder">
        <rect x="175" y="200" width="150" height="120" fill="url(#tealGrad)" stroke="white" stroke-width="2"/>
        <ellipse cx="250" cy="320" rx="75" ry="25" fill="#16A085" stroke="white" stroke-width="2"/>
        <ellipse cx="250" cy="200" rx="75" ry="25" fill="#1ABC9C" stroke="white" stroke-width="2"/>
      </g>

      <!-- RED TOP CYLINDER (proper cylinder shape) -->
      <g id="top-cylinder" style="display:none">
        <!-- Body -->
        <rect x="175" y="130" width="150" height="70" fill="url(#redGrad)" stroke="white" stroke-width="2"/>
        <!-- Bottom ellipse (hidden behind base top, but needed for overlap) -->
        <ellipse cx="250" cy="200" rx="75" ry="25" fill="#C0392B" stroke="white" stroke-width="2"/>
        <!-- Top ellipse -->
        <ellipse cx="250" cy="130" rx="75" ry="25" fill="#E74C3C" stroke="white" stroke-width="2"/>
        <!-- Highlight on body for 3D effect -->
        <rect x="195" y="132" width="30" height="66" fill="rgba(255,255,255,0.08)" rx="2"/>
      </g>

      <!-- UNROLLED FLAT RECTANGLE -->
      <g id="flat-group" style="display:none">
        <!-- The flat rectangle that slides out from the cylinder top -->
        <!-- Left curved edge (still attached to cylinder) -->
        <rect id="flat-rect" x="175" y="105" width="0" height="50" fill="url(#redGrad)" stroke="white" stroke-width="2" rx="3"/>
        <!-- Dimension labels on the flat rect -->
        <text id="flat-w-label" x="250" y="135" text-anchor="middle" fill="white" font-size="12" font-weight="bold" style="display:none">2πr</text>
        <text id="flat-h-label" x="0" y="0" fill="white" font-size="11" style="display:none">h</text>
      </g>

      <!-- DATA LABELS -->
      <g id="data-labels" style="display:none">
        <!-- 原高 -->
        <line x1="340" y1="200" x2="340" y2="320" stroke="#1ABC9C" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="335" y1="200" x2="345" y2="200" stroke="#1ABC9C" stroke-width="2"/>
        <line x1="335" y1="320" x2="345" y2="320" stroke="#1ABC9C" stroke-width="2"/>
        <text x="350" y="265" fill="#1ABC9C" font-size="13" font-weight="bold">原高=10cm</text>
        <!-- 增高 -->
        <line x1="375" y1="130" x2="375" y2="200" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="370" y1="130" x2="380" y2="130" stroke="#E74C3C" stroke-width="2"/>
        <line x1="370" y1="200" x2="380" y2="200" stroke="#E74C3C" stroke-width="2"/>
        <text x="385" y="170" fill="#E74C3C" font-size="13" font-weight="bold">增高=5cm</text>
        <!-- 表面积 -->
        <text x="250" y="385" text-anchor="middle" fill="#FFD700" font-size="16" font-weight="bold">增加的表面积 = 628 cm²</text>
      </g>
    </svg>

    <!-- Data Panel -->
    <div id="data-panel" class="data-panel" style="display:none">
      <h3>📊 计算数据</h3>
      <div class="data-row"><span class="data-label">底面半径 r</span><span class="data-value">10 cm</span></div>
      <div class="data-row"><span class="data-label">圆柱原高 h₁</span><span class="data-value">10 cm</span></div>
      <div class="data-row"><span class="data-label">增加高度 h₂</span><span class="data-value">5 cm</span></div>
      <div class="data-row"><span class="data-label">增高后总高</span><span class="data-value">15 cm</span></div>
      <div class="data-row"><span class="data-label">底面周长 2πr</span><span class="data-value">62.8 cm</span></div>
      <div class="data-row highlight"><span class="data-label">增加的侧面积</span><span class="data-value">628 cm²</span></div>
      <div class="formula">
        <strong>计算过程：</strong><br>
        ΔS = 2πr × Δh<br>
        = 2 × 3.14 × 10 × 5<br>
        = <strong style="color:#FFD700">628 cm²</strong>
      </div>
    </div>
  </main>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-primary" id="btn-rise">⬆ 上升</button>
    <button class="btn btn-reset-btn" id="btn-reset" style="display:none">↻ 复原</button>
    <button class="btn btn-primary" id="btn-data">📊 显示数据</button>
    
    <div class="slider-group" id="slider-group" style="opacity:0.3;pointer-events:none">
      <span class="slider-label">滑块拉开（右）:</span>
      <input type="range" id="slider" min="0" max="100" value="0" class="slider">
    </div>
  </div>

  <footer>
    <p>圆柱体侧面积可视化演示 © 2026</p>
  </footer>
</div>

<script>
const slider = document.getElementById('slider');
const btnRise = document.getElementById('btn-rise');
const btnReset = document.getElementById('btn-reset');
const btnData = document.getElementById('btn-data');
const sliderGroup = document.getElementById('slider-group');
const topCylinder = document.getElementById('top-cylinder');
const flatGroup = document.getElementById('flat-group');
const flatRect = document.getElementById('flat-rect');
const flatWLabel = document.getElementById('flat-w-label');
const flatHLabel = document.getElementById('flat-h-label');
const dataLabels = document.getElementById('data-labels');
const dataPanel = document.getElementById('data-panel');

let risen = false;
let showingData = false;

// === RISE ===
btnRise.addEventListener('click', () => {
  if (risen) return;
  risen = true;
  topCylinder.style.display = 'block';
  btnRise.style.display = 'none';
  btnReset.style.display = 'inline-block';
  sliderGroup.style.opacity = '1';
  sliderGroup.style.pointerEvents = 'auto';

  // Animate: red cylinder rises from top of base
  const body = topCylinder.querySelector('rect');
  const topEll = topCylinder.querySelectorAll('ellipse')[1];
  const botEll = topCylinder.querySelectorAll('ellipse')[0];
  let h = 0;
  const anim = setInterval(() => {
    h += 3;
    if (h >= 70) { h = 70; clearInterval(anim); }
    body.setAttribute('y', 200 - h);
    body.setAttribute('height', h);
    topEll.setAttribute('cy', 200 - h);
  }, 16);
});

// === RESET ===
btnReset.addEventListener('click', () => {
  risen = false;
  slider.value = 0;
  topCylinder.style.display = 'none';
  flatGroup.style.display = 'none';
  btnRise.style.display = 'inline-block';
  btnReset.style.display = 'none';
  sliderGroup.style.opacity = '0.3';
  sliderGroup.style.pointerEvents = 'none';
});

// === SLIDER ===
slider.addEventListener('input', (e) => {
  if (!risen) return;
  const p = e.target.value / 100;

  if (p < 0.05) {
    // Fully wrapped: show as cylinder on top
    topCylinder.style.display = 'block';
    flatGroup.style.display = 'none';
  } else {
    // Unrolling: hide cylinder, show flat rect extending right
    topCylinder.style.display = 'none';
    flatGroup.style.display = 'block';

    const maxW = 280;
    const w = p * maxW;
    const h = 50;
    const startX = 175;
    const y = 105;

    flatRect.setAttribute('x', startX);
    flatRect.setAttribute('y', y);
    flatRect.setAttribute('width', w);
    flatRect.setAttribute('height', h);

    if (p > 0.4) {
      flatWLabel.style.display = 'block';
      flatWLabel.setAttribute('x', startX + w / 2);
      flatWLabel.setAttribute('y', y + h / 2 + 4);
    } else {
      flatWLabel.style.display = 'none';
    }
  }
});

// === SHOW DATA ===
btnData.addEventListener('click', () => {
  showingData = !showingData;
  dataPanel.style.display = showingData ? 'flex' : 'none';
  dataLabels.style.display = (showingData && risen) ? 'block' : 'none';
  btnData.textContent = showingData ? '🔽 隐藏数据' : '📊 显示数据';
});
</script>
</body>
</html>
