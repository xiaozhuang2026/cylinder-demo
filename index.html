<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圆柱体侧面积演示</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>🔵 圆柱体侧面积演示</h1>
    <p>点击"上升"增加高度，拖动滑块展开侧面</p>
  </header>

  <main class="demo-area">
    <svg class="visualization" viewBox="0 0 500 420">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="white"/>
        </marker>
        <linearGradient id="tealGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1ABC9C"/>
          <stop offset="100%" stop-color="#16A085"/>
        </linearGradient>
        <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#E74C3C"/>
          <stop offset="100%" stop-color="#C0392B"/>
        </linearGradient>
      </defs>

      <!-- Grid background -->
      <rect x="0" y="0" width="500" height="420" fill="#2D2D2D"/>
      <g stroke="#3a3a3a" stroke-width="0.5">
        <line x1="0" y1="100" x2="500" y2="100"/>
        <line x1="0" y1="200" x2="500" y2="200"/>
        <line x1="0" y1="300" x2="500" y2="300"/>
        <line x1="100" y1="0" x2="100" y2="420"/>
        <line x1="200" y1="0" x2="200" y2="420"/>
        <line x1="300" y1="0" x2="300" y2="420"/>
        <line x1="400" y1="0" x2="400" y2="420"/>
      </g>

      <!-- === BASE CYLINDER (always visible) === -->
      <g id="base-cylinder">
        <!-- Body -->
        <rect x="175" y="200" width="150" height="120" fill="url(#tealGrad)" stroke="white" stroke-width="2"/>
        <!-- Bottom ellipse -->
        <ellipse cx="250" cy="320" rx="75" ry="25" fill="#16A085" stroke="white" stroke-width="2"/>
        <!-- Top ellipse -->
        <ellipse cx="250" cy="200" rx="75" ry="25" fill="#1ABC9C" stroke="white" stroke-width="2"/>
      </g>

      <!-- === RED TOP BLOCK (hidden initially, shown on "上升") === -->
      <g id="top-block" style="display:none">
        <!-- Red block body -->
        <rect x="175" y="130" width="150" height="70" fill="url(#redGrad)" stroke="white" stroke-width="2" id="red-body"/>
        <!-- Red block top ellipse -->
        <ellipse cx="250" cy="130" rx="75" ry="25" fill="#E74C3C" stroke="white" stroke-width="2" id="red-top"/>
      </g>

      <!-- === UNROLLED RECTANGLE (appears when slider moves right) === -->
      <g id="unrolled-rect" style="display:none">
        <rect x="175" y="130" width="0" height="70" fill="url(#redGrad)" stroke="white" stroke-width="2" id="flat-rect"/>
        <text x="250" y="170" text-anchor="middle" fill="white" font-size="13" font-weight="bold" id="flat-label" style="display:none">2πr × h</text>
      </g>

      <!-- === DATA LABELS === -->
      <g id="data-labels" style="display:none">
        <!-- 原高 arrow -->
        <line x1="340" y1="200" x2="340" y2="320" stroke="#1ABC9C" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="335" y1="200" x2="345" y2="200" stroke="#1ABC9C" stroke-width="2"/>
        <line x1="335" y1="320" x2="345" y2="320" stroke="#1ABC9C" stroke-width="2"/>
        <text x="350" y="265" fill="#1ABC9C" font-size="13" font-weight="bold">原高 = 10cm</text>

        <!-- 增高 arrow -->
        <line x1="370" y1="130" x2="370" y2="200" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="365" y1="130" x2="375" y2="130" stroke="#E74C3C" stroke-width="2"/>
        <line x1="365" y1="200" x2="375" y2="200" stroke="#E74C3C" stroke-width="2"/>
        <text x="380" y="170" fill="#E74C3C" font-size="13" font-weight="bold">增高 = 5cm</text>

        <!-- 增加的表面积 -->
        <text x="250" y="380" text-anchor="middle" fill="#FFD700" font-size="16" font-weight="bold">增加的表面积 = 628 cm²</text>
      </g>

      <!-- Radius indicator -->
      <g id="radius-indicator" style="display:none">
        <line x1="250" y1="320" x2="325" y2="320" stroke="white" stroke-width="1.5" stroke-dasharray="4,2"/>
        <text x="280" y="345" text-anchor="middle" fill="white" font-size="12">r=10cm</text>
      </g>
    </svg>

    <!-- Data Panel -->
    <div id="data-panel" class="data-panel" style="display:none">
      <h3>📊 计算数据</h3>
      <div class="data-row">
        <span class="data-label">底面半径 r</span>
        <span class="data-value">10 cm</span>
      </div>
      <div class="data-row">
        <span class="data-label">圆柱原高 h₁</span>
        <span class="data-value">10 cm</span>
      </div>
      <div class="data-row">
        <span class="data-label">增加高度 h₂</span>
        <span class="data-value">5 cm</span>
      </div>
      <div class="data-row">
        <span class="data-label">增高后总高</span>
        <span class="data-value">15 cm</span>
      </div>
      <div class="data-row">
        <span class="data-label">底面周长 2πr</span>
        <span class="data-value">62.8 cm</span>
      </div>
      <div class="data-row highlight">
        <span class="data-label">增加的侧面积</span>
        <span class="data-value">628 cm²</span>
      </div>
      <div class="formula">
        <strong>计算过程：</strong><br>
        ΔS = 2πr × Δh<br>
        = 2 × 3.14 × 10 × 5<br>
        = <strong style="color:#FFD700">628 cm²</strong>
      </div>
    </div>
  </main>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-primary" id="btn-rise">⬆ 上升</button>
    <button class="btn btn-reset-btn" id="btn-reset" style="display:none">↻ 复原</button>
    <button class="btn btn-primary" id="btn-data">📊 显示数据</button>
    
    <div class="slider-group" id="slider-group" style="opacity:0.3;pointer-events:none">
      <span class="slider-label">滑块拉杆 (秒):</span>
      <input type="range" id="slider" min="0" max="100" value="0" class="slider">
      <span class="slider-value" id="slider-val">0s</span>
    </div>
  </div>

  <footer>
    <p>圆柱体侧面积可视化演示 © 2026</p>
  </footer>
</div>

<script>
const slider = document.getElementById('slider');
const sliderVal = document.getElementById('slider-val');
const btnRise = document.getElementById('btn-rise');
const btnReset = document.getElementById('btn-reset');
const btnData = document.getElementById('btn-data');
const sliderGroup = document.getElementById('slider-group');
const topBlock = document.getElementById('top-block');
const unrolledRect = document.getElementById('unrolled-rect');
const flatRect = document.getElementById('flat-rect');
const flatLabel = document.getElementById('flat-label');
const dataLabels = document.getElementById('data-labels');
const dataPanel = document.getElementById('data-panel');
const redBody = document.getElementById('red-body');
const redTop = document.getElementById('red-top');

let risen = false;
let showingData = false;

// === RISE BUTTON ===
btnRise.addEventListener('click', () => {
  if (risen) return;
  risen = true;
  topBlock.style.display = 'block';
  btnRise.style.display = 'none';
  btnReset.style.display = 'inline-block';
  sliderGroup.style.opacity = '1';
  sliderGroup.style.pointerEvents = 'auto';
  
  // Animate rise
  let h = 0;
  const riseAnim = setInterval(() => {
    h += 2;
    if (h >= 70) { h = 70; clearInterval(riseAnim); }
    redBody.setAttribute('height', h);
    redBody.setAttribute('y', 200 - h);
    redTop.setAttribute('cy', 200 - h);
  }, 20);
});

// === RESET BUTTON ===
btnReset.addEventListener('click', () => {
  risen = false;
  slider.value = 0;
  sliderVal.textContent = '0s';
  
  // Hide red block
  topBlock.style.display = 'none';
  unrolledRect.style.display = 'none';
  redBody.setAttribute('width', 150);
  redBody.setAttribute('x', 175);
  redTop.setAttribute('rx', 75);
  
  btnRise.style.display = 'inline-block';
  btnReset.style.display = 'none';
  sliderGroup.style.opacity = '0.3';
  sliderGroup.style.pointerEvents = 'none';
});

// === SLIDER ===
slider.addEventListener('input', (e) => {
  const p = e.target.value / 100;
  sliderVal.textContent = (p * 3.4).toFixed(1) + 's';
  
  if (!risen) return;
  
  // p=0: red block on top of cylinder (wrapped)
  // p=1: red block unrolled into flat rectangle extending to the right
  
  if (p === 0) {
    // Fully wrapped - show as block on top
    topBlock.style.display = 'block';
    unrolledRect.style.display = 'none';
    redBody.setAttribute('width', 150);
    redBody.setAttribute('x', 175);
    redTop.setAttribute('rx', 75);
  } else {
    // Unrolling animation
    topBlock.style.display = 'none';
    unrolledRect.style.display = 'block';
    
    // Rectangle grows from the cylinder position to the right
    // At p=1, the rectangle width = circumference representation (let's use 250px for visual)
    const maxWidth = 280;
    const width = 150 + p * maxWidth;
    const height = 70;
    
    flatRect.setAttribute('width', width);
    flatRect.setAttribute('height', height);
    flatRect.setAttribute('x', 175);
    flatRect.setAttribute('y', 130);
    
    if (p > 0.3) {
      flatLabel.style.display = 'block';
      flatLabel.setAttribute('x', 175 + width / 2);
    } else {
      flatLabel.style.display = 'none';
    }
  }
});

// === SHOW DATA ===
btnData.addEventListener('click', () => {
  showingData = !showingData;
  dataPanel.style.display = showingData ? 'flex' : 'none';
  dataLabels.style.display = showingData && risen ? 'block' : 'none';
  btnData.textContent = showingData ? '🔽 隐藏数据' : '📊 显示数据';
});
</script>
</body>
</html>
