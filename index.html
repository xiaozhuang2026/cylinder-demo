<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圆柱体侧面积演示</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>🔵 圆柱体侧面积演示</h1>
    <p>点击"上升"增加高度，拖动滑块展开侧面</p>
  </header>

  <main class="demo-area">
    <svg class="visualization" viewBox="0 0 600 450" id="main-svg">
      <defs>
        <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#1ABC9C"/>
          <stop offset="100%" stop-color="#16A085"/>
        </linearGradient>
        <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#C0392B"/>
          <stop offset="100%" stop-color="#E74C3C"/>
        </linearGradient>
      </defs>

      <rect x="0" y="0" width="600" height="450" fill="#2D2D2D"/>
      <g stroke="#3a3a3a" stroke-width="0.5">
        <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
        <line x1="0" y1="300" x2="600" y2="300"/><line x1="150" y1="0" x2="150" y2="450"/>
        <line x1="250" y1="0" x2="250" y2="450"/><line x1="350" y1="0" x2="350" y2="450"/>
        <line x1="450" y1="0" x2="450" y2="450"/>
      </g>

      <!-- CYLINDER GROUP (wobbles) -->
      <g id="cyl-group">

        <!-- BASE: original short cylinder (always visible) -->
        <g id="base-cyl">
          <rect x="175" y="200" width="150" height="120" fill="url(#tealGrad)" stroke="white" stroke-width="2"/>
          <ellipse cx="250" cy="320" rx="75" ry="25" fill="#16A085" stroke="white" stroke-width="2"/>
          <ellipse cx="250" cy="200" rx="75" ry="25" fill="#1ABC9C" stroke="white" stroke-width="2"/>
        </g>

        <!-- ADDED HEIGHT: top section (green, appears on "上升") -->
        <g id="top-cyl" style="display:none">
          <!-- Green body for added height -->
          <rect id="top-body" x="175" y="130" width="150" height="70" fill="url(#tealGrad)" stroke="white" stroke-width="2"/>
          <!-- Green top ellipse -->
          <ellipse id="top-ell" cx="250" cy="130" rx="75" ry="25" fill="#1ABC9C" stroke="white" stroke-width="2"/>
          <!-- Bottom of added section (hidden by base top) -->
          <ellipse cx="250" cy="200" rx="75" ry="25" fill="#16A085" stroke="white" stroke-width="2"/>
        </g>

        <!-- RED SKIN: peels off to the left when slider moves -->
        <g id="peel-group" style="display:none">
          <!-- The peeling skin - curves from cylinder to flat rect going LEFT -->
          <!-- Flat rectangle portion -->
          <rect id="flat-rect" x="175" y="130" width="0" height="70" fill="url(#redGrad)" stroke="white" stroke-width="2"/>
          
          <!-- Curve connecting flat rect to cylinder (bezier path) -->
          <path id="peel-curve" d="" fill="url(#redGrad)" stroke="white" stroke-width="2"/>
        </g>

        <!-- Green top ellipse that stays on top when peeling -->
        <ellipse id="floating-top" cx="250" cy="130" rx="75" ry="25" fill="#1ABC9C" stroke="white" stroke-width="2" style="display:none"/>
      </g>

      <!-- DATA LABELS -->
      <g id="data-labels" style="display:none">
        <line x1="340" y1="200" x2="340" y2="320" stroke="#1ABC9C" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="335" y1="200" x2="345" y2="200" stroke="#1ABC9C" stroke-width="2"/>
        <line x1="335" y1="320" x2="345" y2="320" stroke="#1ABC9C" stroke-width="2"/>
        <text x="350" y="265" fill="#1ABC9C" font-size="14" font-weight="bold">原高=10cm</text>

        <line x1="375" y1="130" x2="375" y2="200" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="370" y1="130" x2="380" y2="130" stroke="#E74C3C" stroke-width="2"/>
        <line x1="370" y1="200" x2="380" y2="200" stroke="#E74C3C" stroke-width="2"/>
        <text x="385" y="170" fill="#E74C3C" font-size="14" font-weight="bold">增高=5cm</text>

        <text x="250" y="400" text-anchor="middle" fill="#FFD700" font-size="18" font-weight="bold">增加的表面积 = 628 cm²</text>
      </g>
    </svg>

    <!-- Data Panel -->
    <div id="data-panel" class="data-panel" style="display:none">
      <h3>📊 计算数据</h3>
      <div class="data-row"><span class="data-label">底面半径 r</span><span class="data-value">10 cm</span></div>
      <div class="data-row"><span class="data-label">圆柱原高 h₁</span><span class="data-value">10 cm</span></div>
      <div class="data-row"><span class="data-label">增加高度 h₂</span><span class="data-value">5 cm</span></div>
      <div class="data-row"><span class="data-label">增高后总高</span><span class="data-value">15 cm</span></div>
      <div class="data-row"><span class="data-label">底面周长 2πr</span><span class="data-value">62.8 cm</span></div>
      <div class="data-row highlight"><span class="data-label">增加的侧面积</span><span class="data-value">628 cm²</span></div>
      <div class="formula">
        <strong>计算过程：</strong><br>
        ΔS = 2πr × Δh<br>
        = 2 × 3.14 × 10 × 5<br>
        = <strong style="color:#FFD700">628 cm²</strong>
      </div>
    </div>
  </main>

  <div class="controls">
    <button class="btn btn-primary" id="btn-rise">⬆ 上升</button>
    <button class="btn btn-reset-btn" id="btn-reset" style="display:none">↻ 复原</button>
    <button class="btn btn-primary" id="btn-data">📊 显示数据</button>
    <div class="slider-group" id="slider-group" style="opacity:0.3;pointer-events:none">
      <span class="slider-label">滑块拉开（右）:</span>
      <input type="range" id="slider" min="0" max="100" value="0" class="slider">
    </div>
  </div>

  <footer>
    <p>圆柱体侧面积可视化演示 © 2026</p>
  </footer>
</div>

<script>
const slider = document.getElementById('slider');
const btnRise = document.getElementById('btn-rise');
const btnReset = document.getElementById('btn-reset');
const btnData = document.getElementById('btn-data');
const sliderGroup = document.getElementById('slider-group');
const cylGroup = document.getElementById('cyl-group');
const topCyl = document.getElementById('top-cyl');
const topBody = document.getElementById('top-body');
const topEll = document.getElementById('top-ell');
const peelGroup = document.getElementById('peel-group');
const flatRect = document.getElementById('flat-rect');
const peelCurve = document.getElementById('peel-curve');
const floatingTop = document.getElementById('floating-top');
const dataLabels = document.getElementById('data-labels');
const dataPanel = document.getElementById('data-panel');

const CX = 250, CY_TOP = 130, CY_BOT = 200, RX = 75, RY = 25, BODY_H = 70;
let risen = false, showingData = false;
let wobbleId = null, wobbleStart = 0;

// === RISE ===
btnRise.addEventListener('click', () => {
  if (risen) return;
  risen = true;
  btnRise.style.display = 'none';
  btnReset.style.display = 'inline-block';
  sliderGroup.style.opacity = '1';
  sliderGroup.style.pointerEvents = 'auto';

  // Animate cylinder growing taller - all green
  topCyl.style.display = 'block';
  let h = 0;
  const anim = setInterval(() => {
    h += 3;
    if (h >= BODY_H) { h = BODY_H; clearInterval(anim); }
    topBody.setAttribute('y', CY_BOT - h);
    topBody.setAttribute('height', h);
    topEll.setAttribute('cy', CY_BOT - h);
  }, 16);
});

// === RESET ===
btnReset.addEventListener('click', () => {
  risen = false;
  slider.value = 0;
  topCyl.style.display = 'none';
  peelGroup.style.display = 'none';
  floatingTop.style.display = 'none';
  btnRise.style.display = 'inline-block';
  btnReset.style.display = 'none';
  sliderGroup.style.opacity = '0.3';
  sliderGroup.style.pointerEvents = 'none';
  cylGroup.setAttribute('transform', '');
  if (wobbleId) cancelAnimationFrame(wobbleId);
});

// === SLIDER ===
slider.addEventListener('input', (e) => {
  if (!risen) return;
  const p = e.target.value / 100;

  if (p <= 0.02) {
    // Fully wrapped: show green top cylinder, hide peel
    topCyl.style.display = 'block';
    peelGroup.style.display = 'none';
    floatingTop.style.display = 'none';
  } else {
    // Peeling: hide green top body, show red skin peeling left
    topCyl.style.display = 'none';
    peelGroup.style.display = 'block';
    floatingTop.style.display = 'block';

    const maxW = 200; // max flat rect width
    const w = (p - 0.02) / 0.98 * maxW;

    // Flat rectangle extends to the LEFT from cylinder left edge
    flatRect.setAttribute('x', 175 - w);
    flatRect.setAttribute('y', CY_TOP);
    flatRect.setAttribute('width', w);
    flatRect.setAttribute('height', BODY_H);

    // Curve from left edge of flat rect back to cylinder surface
    // Bezier curve: starts flat at left rect edge, curves down to cylinder left edge
    const startX = 175 - w;
    const curveLen = Math.min(30, w * 0.3);
    peelCurve.setAttribute('d',
      `M ${startX} ${CY_TOP} ` +
      `C ${startX + curveLen * 0.3} ${CY_TOP - 20}, ${175 - curveLen * 0.5} ${CY_TOP - 15}, 175 ${CY_TOP} ` +
      `L 175 ${CY_BOT} ` +
      `C ${175 - curveLen * 0.5} ${CY_BOT + 15}, ${startX + curveLen * 0.3} ${CY_BOT + 20}, ${startX} ${CY_BOT} ` +
      `Z`
    );

    startWobble();
  }
});

// === WOBBLE ===
function startWobble() {
  wobbleStart = Date.now();
  if (wobbleId) cancelAnimationFrame(wobbleId);
  doWobble();
}

function doWobble() {
  const t = Date.now() - wobbleStart;
  const angle = Math.sin(t * 0.012) * 2.5 * Math.max(0, 1 - t / 600);
  cylGroup.setAttribute('transform', `rotate(${angle} 250 250)`);
  if (t < 600) wobbleId = requestAnimationFrame(doWobble);
  else cylGroup.setAttribute('transform', '');
}

// === SHOW DATA ===
btnData.addEventListener('click', () => {
  showingData = !showingData;
  dataPanel.style.display = showingData ? 'flex' : 'none';
  dataLabels.style.display = (showingData && risen) ? 'block' : 'none';
  btnData.textContent = showingData ? '🔽 隐藏数据' : '📊 显示数据';
});
</script>
</body>
</html>
